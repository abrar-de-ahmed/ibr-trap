name: Supervisor Agent - Daily Agent Health Check

on:
  schedule:
    # Daily at 7:00 UTC (12:00 PM PKT)
    - cron: '0 7 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  supervisor-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nodemailer
        run: npm install nodemailer

      - name: Run Supervisor Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: node .github/workflows/scripts/supervisor.js
