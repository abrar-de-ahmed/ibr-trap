name: SEO Agent - Weekly Audit

on:
  schedule:
    # Every Wednesday at 6:00 UTC
    - cron: '0 6 * * 3'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install nodemailer
        run: npm install nodemailer

      - name: Run SEO Agent
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: node .github/workflows/scripts/seo-check.js
